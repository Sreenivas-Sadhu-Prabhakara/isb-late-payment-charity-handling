spring:
  application:
    name: isb-late-payment-charity-handling

server:
  port: 8080
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true   # /actuator/health/liveness + /readiness for K8s probes
  info:
    env:
      enabled: true

info:
  isb:
    serviceDomain: "Late Payment Charity Handling"
    businessArea: "Islamic Financing"
    businessDomain: "Lease And Partnership Financing"
    functionalPattern: "Process"
    assetType: "Late Payment Charity Entry"
    controlRecord: "Late Payment Charity Entry Procedure"

resilience4j:
  circuitbreaker:
    instances:
      serviceDomain:
        slidingWindowSize: 20
        failureRateThreshold: 50
        waitDurationInOpenState: 10s

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
